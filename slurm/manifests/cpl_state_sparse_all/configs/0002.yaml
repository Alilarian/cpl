alg: CPL
alg_kwargs:
  alpha: 0.1
  bc_coeff: 0.0
  bc_data: all
  bc_steps: 200000
  contrastive_bias: 0.5
checkpoint: null
dataset: FeedbackBuffer
dataset_kwargs:
  batch_size: 96
  capacity: 10000
  label_key: rl_sum
  mode: comparison
  path: datasets/mw/pref/mw_button-press-v2_ep2500_n0.3.npz
  segment_length: null
eval_env: mw_button-press-v2
network: ActorPolicy
network_kwargs:
  actor_class: ContinuousMLPActor
  actor_kwargs:
    dropout: 0.25
    hidden_layers:
    - 512
    - 512
    ortho_init: true
    output_act:
    - import
    - torch.nn
    - Tanh
optim: Adam
optim_kwargs:
  lr: 0.0001
processor: null
schedule:
  actor: linear_warmup
schedule_kwargs:
  actor:
    multiplier: 1.0
    total_steps: 10000
seed: 0
trainer_kwargs:
  eval_fn: eval_policy
  eval_freq: 5000
  eval_kwargs:
    num_ep: 25
  log_freq: 500
  loss_metric: reward
  profile_freq: 500
  total_steps: 500000
  train_dataloader_kwargs:
    batch_size: null
    num_workers: 0
