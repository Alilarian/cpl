
alg: DemoCPL
alg_kwargs:
  alpha: 0.1
  contrastive_bias: 0.5
  bc_steps: 20000
  bc_coeff: 0.0

optim: Adam
optim_kwargs:
  lr: 0.0001

network: ActorPolicy
network_kwargs:
  actor_class: ContinuousMLPActor
  actor_kwargs:
    dropout: 0.25
    output_act: ["import", "torch.nn", "Tanh"]
    hidden_layers: [512, 512]
    ortho_init: True

checkpoint: null

eval_env: mw_drawer-open-v2

dataset: DemoBuffer
dataset_kwargs:
  path: /scratch/general/vast/u1472210/demo_labels/mw_drawer-open-v2/demo_labels_K7.npz
  batch_size: 96
  segment_length: null
  reward_scale: 1.0
  reward_shift: 0.0

processor: null

schedule:
  actor: linear_warmup
schedule_kwargs:
  actor:
    total_steps: 10000
    multiplier: 1.0

trainer_kwargs:
  total_steps: 500000
  log_freq: 500
  profile_freq: 500
  eval_freq: 5000
  eval_fn: eval_policy
  eval_kwargs:
    num_ep: 25
  loss_metric: reward
  train_dataloader_kwargs:
    num_workers: 0
    batch_size: null

seed: null
